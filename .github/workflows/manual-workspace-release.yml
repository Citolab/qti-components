name: "Manual: workspace-release"

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to release from'
        required: false
        default: 'main'
        type: string
      dry_run:
        description: 'Run semantic-release in dry-run mode'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || 'main' }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org/'

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run semantic-release (changed packages, dry-run)
        if: ${{ inputs.dry_run }}
        run: pnpm run ci:release:changed:dry
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_GH_TOKEN || secrets.GITHUB_TOKEN }}
          HUSKY: 0

      - name: Run semantic-release (changed packages)
        if: ${{ !inputs.dry_run }}
        run: pnpm run ci:release:changed
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_GH_TOKEN || secrets.GITHUB_TOKEN }}
          HUSKY: 0

  dispatch-publish:
    if: ${{ !inputs.dry_run }}
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch publish-packages workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.RELEASE_GH_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'publish-packages.yml',
              ref: '${{ inputs.branch || 'main' }}',
              inputs: {
                branch: '${{ inputs.branch || 'main' }}'
              }
            });
