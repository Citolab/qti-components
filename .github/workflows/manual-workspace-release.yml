name: "Manual: workspace-release"

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to release from'
        required: false
        default: 'main'
        type: string
      dry_run:
        description: 'Run semantic-release in dry-run mode'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || 'main' }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org/'

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run semantic-release (changed packages, dry-run)
        if: ${{ inputs.dry_run }}
        run: pnpm run ci:release:changed:dry
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_GH_TOKEN || secrets.GITHUB_TOKEN }}
          HUSKY: 0

      - name: Run semantic-release (changed packages)
        if: ${{ !inputs.dry_run }}
        run: pnpm run ci:release:changed
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_GH_TOKEN || secrets.GITHUB_TOKEN }}
          HUSKY: 0

      - name: Ensure OIDC trusted publishing auth
        if: ${{ !inputs.dry_run }}
        run: |
          rm -f .npmrc "$HOME/.npmrc"
          npm config delete always-auth || true
          npm config delete //registry.npmjs.org/:_authToken || true

      - name: Publish changed workspace packages if needed
        if: ${{ !inputs.dry_run }}
        run: env -u npm_config_recursive -u npm_config_workspace_concurrency -u npm_config_verify_deps_before_run -u npm_config_npm_globalconfig -u npm_config__jsr_registry pnpm run ci:publish:missing
        env:
          WORKSPACE_RELEASE_RUNNER_CONTEXT: manual:workspace-release
          NODE_AUTH_TOKEN: ''
          NPM_TOKEN: ''
          NPM_CONFIG_PROVENANCE: 'true'
