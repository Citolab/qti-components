name: Publish packages

on:
  workflow_call:
    inputs:
      branch:
        description: 'Branch to publish from'
        required: false
        default: 'main'
        type: string
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to publish from'
        required: false
        default: 'main'
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || 'main' }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org/'

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Print tool versions
        run: |
          node --version
          npm --version
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm run build

      - name: Ensure OIDC trusted publishing auth
        run: |
          rm -f .npmrc "$HOME/.npmrc"
          npm config delete always-auth || true
          npm config delete //registry.npmjs.org/:_authToken || true

      - name: Debug OIDC claims for npm audience
        run: |
          node -e '(async () => { const url = `${process.env.ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm:registry.npmjs.org`; const res = await fetch(url, { headers: { Authorization: `bearer ${process.env.ACTIONS_ID_TOKEN_REQUEST_TOKEN}` } }); if (!res.ok) { throw new Error(`OIDC token request failed: ${res.status}`); } const data = await res.json(); const payload = JSON.parse(Buffer.from(data.value.split(".")[1], "base64url").toString("utf8")); const keys = ["aud","iss","sub","repository","repository_owner","ref","ref_type","workflow","workflow_ref","job_workflow_ref","environment"]; const out = Object.fromEntries(keys.filter((k) => k in payload).map((k) => [k, payload[k]])); console.log(JSON.stringify(out, null, 2)); })().catch((err) => { console.error(err); process.exit(1); });'

      - name: Publish changed workspace packages
        run: env -u npm_config_recursive -u npm_config_workspace_concurrency -u npm_config_verify_deps_before_run -u npm_config_npm_globalconfig -u npm_config__jsr_registry pnpm run ci:publish:missing
        env:
          WORKSPACE_RELEASE_RUNNER_CONTEXT: publish-packages
          NODE_AUTH_TOKEN: ''
          NPM_TOKEN: ''
          NPM_CONFIG_PROVENANCE: 'true'
