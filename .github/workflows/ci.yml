name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run CI from'
        required: false
        default: 'main'
        type: string

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || 'main' }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: |
          echo "📦 Installing dependencies..."
          pnpm install

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright
        run: |
          echo "🎭 Installing Playwright browsers..."
          npx playwright install --with-deps

      - name: Run linting
        run: |
          echo "🔍 Running ESLint..."
          pnpm run lint

      - name: Check circular dependencies
        run: |
          echo "🔄 Checking circular dependencies..."
          pnpm run madge

      - name: Run build
        run: |
          echo "🔨 Building project..."
          pnpm run build

      - name: Run tests
        run: |
          echo "🧪 Running tests..."
          pnpm run test

      - name: Run publint
        run: |
          echo "📋 Running publint..."
          pnpm run publint

      - name: Run attw
        run: |
          echo "🔍 Running attw..."
          pnpm run attw
