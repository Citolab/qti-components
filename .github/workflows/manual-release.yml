name: Manual release

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to release from'
        required: false
        default: 'main'
        type: string
      dry_run:
        description: 'Run semantic-release in dry-run mode'
        required: false
        default: false
        type: boolean
      version_mode:
        description: 'Umbrella version strategy'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - exact
      exact_version:
        description: 'Exact next version when version_mode=exact (must be immediate next patch/minor/major)'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      release_commit_created: ${{ steps.detect-release.outputs.release_commit_created }}
      new_umbrella_tag_created: ${{ steps.detect-release.outputs.new_umbrella_tag_created }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || 'main' }}
          fetch-depth: 0

      - name: Capture starting SHA
        id: start-sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Capture starting tags
        id: start-tags
        run: |
          git fetch --force --tags
          start_tags_file="$RUNNER_TEMP/start-release-tags.txt"
          git tag --list '*-v*.*.*' | sort > "$start_tags_file"
          echo "file=$start_tags_file" >> "$GITHUB_OUTPUT"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release mode
        id: resolve-release
        env:
          VERSION_MODE: ${{ inputs.version_mode }}
          EXACT_VERSION: ${{ inputs.exact_version }}
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';

          const parseSemver = (version) => {
            const match = /^(\d+)\.(\d+)\.(\d+)$/.exec(version);
            if (!match) {
              return null;
            }

            return {
              major: Number(match[1]),
              minor: Number(match[2]),
              patch: Number(match[3])
            };
          };

          const toSemver = (parsed) => `${parsed.major}.${parsed.minor}.${parsed.patch}`;

          const bump = (version, type) => {
            const parsed = parseSemver(version);
            if (!parsed) {
              return null;
            }

            if (type === 'patch') {
              return toSemver({ major: parsed.major, minor: parsed.minor, patch: parsed.patch + 1 });
            }

            if (type === 'minor') {
              return toSemver({ major: parsed.major, minor: parsed.minor + 1, patch: 0 });
            }

            if (type === 'major') {
              return toSemver({ major: parsed.major + 1, minor: 0, patch: 0 });
            }

            return null;
          };

          const packageJson = JSON.parse(fs.readFileSync('packages/qti-components/package.json', 'utf8'));
          const currentVersion = packageJson.version;
          const mode = process.env.VERSION_MODE;
          const exactVersion = process.env.EXACT_VERSION?.trim() ?? '';

          if (!['patch', 'minor', 'major', 'exact'].includes(mode)) {
            throw new Error(`Invalid version_mode: ${mode}`);
          }

          let resolvedMode = mode;
          let releaseMarker = mode;

          if (mode === 'exact') {
            if (!exactVersion) {
              throw new Error('exact_version is required when version_mode=exact.');
            }

            if (!parseSemver(exactVersion)) {
              throw new Error(`exact_version must be a strict semver (x.y.z). Received: ${exactVersion}`);
            }

            const nextPatch = bump(currentVersion, 'patch');
            const nextMinor = bump(currentVersion, 'minor');
            const nextMajor = bump(currentVersion, 'major');

            if (exactVersion === nextPatch) {
              resolvedMode = 'patch';
            } else if (exactVersion === nextMinor) {
              resolvedMode = 'minor';
            } else if (exactVersion === nextMajor) {
              resolvedMode = 'major';
            } else {
              throw new Error(
                `exact_version (${exactVersion}) must match the immediate next patch (${nextPatch}), minor (${nextMinor}), or major (${nextMajor}) from ${currentVersion}.`
              );
            }

            releaseMarker = exactVersion;
          } else if (exactVersion) {
            throw new Error('exact_version must be empty unless version_mode=exact.');
          }

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `resolved_mode=${resolvedMode}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `release_marker=${releaseMarker}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `exact_version=${exactVersion}\n`);
          NODE

      - name: Create umbrella release-driving commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore(release): umbrella ${{ steps.resolve-release.outputs.release_marker }}"

      - name: Run semantic-release (dry-run)
        if: ${{ inputs.dry_run }}
        run: pnpm run ci:release:umbrella:dry
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_GH_TOKEN || secrets.GITHUB_TOKEN }}
          HUSKY: 0
          UMBRELLA_RELEASE_MODE: ${{ steps.resolve-release.outputs.resolved_mode }}
          UMBRELLA_EXACT_VERSION: ${{ steps.resolve-release.outputs.exact_version }}

      - name: Run semantic-release
        if: ${{ !inputs.dry_run }}
        run: pnpm run ci:release:umbrella
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_GH_TOKEN || secrets.GITHUB_TOKEN }}
          HUSKY: 0
          UMBRELLA_RELEASE_MODE: ${{ steps.resolve-release.outputs.resolved_mode }}
          UMBRELLA_EXACT_VERSION: ${{ steps.resolve-release.outputs.exact_version }}

      - name: Detect whether semantic-release created a commit
        id: detect-release
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "release_commit_created=false" >> "$GITHUB_OUTPUT"
            echo "new_umbrella_tag_created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          START_SHA="${{ steps.start-sha.outputs.sha }}"
          END_SHA="$(git rev-parse HEAD)"

          if [ "$START_SHA" = "$END_SHA" ]; then
            echo "release_commit_created=false" >> "$GITHUB_OUTPUT"
          else
            echo "release_commit_created=true" >> "$GITHUB_OUTPUT"
          fi

          git fetch --force --tags
          END_TAGS_FILE="$RUNNER_TEMP/end-release-tags.txt"
          git tag --list '*-v*.*.*' | sort > "$END_TAGS_FILE"

          NEW_TAGS="$(comm -13 "${{ steps.start-tags.outputs.file }}" "$END_TAGS_FILE")"

          echo "New release tags:"
          echo "$NEW_TAGS"

          if echo "$NEW_TAGS" | grep -Eq '^qti-components-v[0-9]+\.[0-9]+\.[0-9]+([.-].+)?$'; then
            echo "new_umbrella_tag_created=true" >> "$GITHUB_OUTPUT"
          else
            echo "new_umbrella_tag_created=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    if: ${{ !inputs.dry_run && needs.release.outputs.new_umbrella_tag_created == 'true' }}
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || 'main' }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build umbrella package
        run: pnpm --filter ./packages/qti-components run build

      - name: Ensure OIDC trusted publishing auth
        run: |
          rm -f .npmrc "$HOME/.npmrc"
          npm config delete always-auth || true
          npm config delete //registry.npmjs.org/:_authToken || true

      - name: Publish umbrella package if needed
        run: pnpm run ci:publish:umbrella
        env:
          NODE_AUTH_TOKEN: ''
          NPM_TOKEN: ''
          NPM_CONFIG_PROVENANCE: 'true'
