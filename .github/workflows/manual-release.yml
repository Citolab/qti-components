name: Manual release

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to release from'
        required: false
        default: 'main'
        type: string
      dry_run:
        description: 'Run semantic-release in dry-run mode'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      release_commit_created: ${{ steps.detect-release.outputs.release_commit_created }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || 'main' }}
          fetch-depth: 0

      - name: Capture starting SHA
        id: start-sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm run build

      - name: Run semantic-release (dry-run)
        if: ${{ inputs.dry_run }}
        run: pnpm run release:semantic:dry-run:ci
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_GH_TOKEN || secrets.GITHUB_TOKEN }}
          HUSKY: 0

      - name: Run semantic-release
        if: ${{ !inputs.dry_run }}
        run: pnpm run release:semantic:ci
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_GH_TOKEN || secrets.GITHUB_TOKEN }}
          HUSKY: 0

      - name: Detect whether semantic-release created a commit
        id: detect-release
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "release_commit_created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          START_SHA="${{ steps.start-sha.outputs.sha }}"
          END_SHA="$(git rev-parse HEAD)"

          if [ "$START_SHA" = "$END_SHA" ]; then
            echo "release_commit_created=false" >> "$GITHUB_OUTPUT"
          else
            echo "release_commit_created=true" >> "$GITHUB_OUTPUT"
          fi

  publish:
    if: ${{ !inputs.dry_run && needs.release.outputs.release_commit_created == 'true' }}
    needs: release
    uses: ./.github/workflows/publish-packages.yml
    with:
      branch: ${{ inputs.branch || 'main' }}
    secrets: inherit
